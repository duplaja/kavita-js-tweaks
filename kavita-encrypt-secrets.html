<!DOCTYPE html>
<body>
<input id="pw" placeholder="password (installId)" style="width:400px"><br>
<textarea id="pt" placeholder="plaintext" style="width:400px;height:80px"></textarea><br>
<button onclick="go()">Encrypt</button>
<pre id="out"></pre>
<script>
////dcc96b46
async function go() {
    const password = document.getElementById('pw').value;
    const plaintext = document.getElementById('pt').value;
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
        "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
    );
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false, ["encrypt"]
    );
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv }, key, enc.encode(plaintext)
    );
    const b64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
    document.getElementById('out').innerText = JSON.stringify({
        salt: b64(salt), iv: b64(iv), ct: b64(ct)
    });
}
</script>
</body>
